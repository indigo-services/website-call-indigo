services:
  indigo-strapi:
    build:
      context: .
      dockerfile: strapi/Dockerfile
      args:
        BUILD_CONTEXT: /code
    restart: unless-stopped
    environment:
      # Basic Configuration
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-1337}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_CLIENT: ${DATABASE_CLIENT:-sqlite}
      DATABASE_FILENAME: ${DATABASE_FILENAME:-.tmp/data.db}

      # Security Keys
      APP_KEYS: ${APP_KEYS:-changeMeToRandomString1,changeMeToRandomString2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-changeMeToRandomString}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-changeMeToRandomString}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeMeToRandomString}
      JWT_SECRET: ${JWT_SECRET:-changeMeToRandomString}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET:-changeMeToRandomString}
      ADMIN_PATH: ${ADMIN_PATH:-/manage/admin}

      # Client Configuration
      CLIENT_URL: ${CLIENT_URL:-https://indigo-website-cms.vercel.app}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-changeMeToRandomString}

      # CORS Configuration
      URL: ${URL:-https://riostack-indigo-studio.ck87nu.easypanel.host}
      PUBLIC_URL: ${PUBLIC_URL:-https://riostack-indigo-studio.ck87nu.easypanel.host}

    volumes:
      # Persist SQLite database
      - strapi_data:/app/.tmp
      # Persist uploaded files
      - strapi_uploads:/app/public/uploads

    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:1337/', (r) => {process.exit(r.statusCode === 200 || r.statusCode === 302 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    networks:
      - indigo-network

volumes:
  strapi_data:
    driver: local
  strapi_uploads:
    driver: local

networks:
  indigo-network:
    driver: bridge
