name: Legacy Vercel Deploy Lane

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Stack Before Manual Vercel Use
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn check:format
        continue-on-error: true

      - name: Run linter
        run: yarn lint
        continue-on-error: true

      - name: Build Next.js
        run: cd next && yarn build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:1337' }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL || 'http://localhost:3000' }}

      - name: Build Strapi
        run: cd strapi && yarn build
        continue-on-error: true

      - name: Run health check
        run: yarn health:check
        continue-on-error: true
